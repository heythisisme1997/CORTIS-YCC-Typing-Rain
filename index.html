<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORIS YCC Typing Rain</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="start-screen">
            <h1>CORIS YCC Typing Rain</h1>
            <button id="start-btn">START GAME</button>
        </div>
        
        <div id="score-board">
            Score: <span id="score">0</span> | 
            Level: <span id="level-num">1</span>
        </div>
        
        <div id="lives-display">Lives: <span id="lives">❤️❤️❤️</span></div>
        
        <div id="word-layer"></div>
        
        <input type="text" id="word-input" placeholder="Type here..." autofocus autocomplete="off">
    </div>
    <audio id="bgm" src="bgm.mp3" loop></audio>
    <script src="script.js"></script>
</body>
</html>
